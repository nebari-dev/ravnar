version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  jobs:
    post_system_dependencies:
      - MISE_INSTALL_PATH=./mise curl https://mise.run | sh
      - cp docs/tools/mise.toml .
      - ./mise trust --yes && ./mise install

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true
