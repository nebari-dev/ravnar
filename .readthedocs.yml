version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  jobs:
    post_system_dependencies:
      - curl https://mise.run | MISE_INSTALL_PATH=./mise sh
      - ls -la .
      - ./mise --version
      - cat docs/tools/mise.toml | tee mise.toml
      - ./mise trust --yes && ./mise install
    post_install:
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --link-mode=copy --locked --group=docs

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true
