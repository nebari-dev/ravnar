name: lint

on:
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit

      - name: Setup lint utilities
        run: uv run pre-commit install-hooks

      - name: Run format checks
        run: uv run pre-commit run --all-files --show-diff-on-failure --color=always

  types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run type checks
        run: uv run mypy

  helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up helm
        uses: azure/setup-helm@v4

      - name: Patch helm chart
        uses: ./.github/actions/patch-helm-chart

      - name: Install chart dependencies
        run: helm dependencies update ./helm/ravnar

      - name: Lint chart
        run: helm lint --strict ./helm/ravnar

      - name: Template chart
        run: helm template --namespace ravnar ravnar ./helm/ravnar
